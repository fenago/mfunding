# Supabase project config — version-controlled so edge-function auth (verify_jwt)
# is no longer dashboard-only and invisible (audit #20). These mirror the live
# settings; deploying via the CLI will keep them in sync.
project_id = "ehibjeonqpqskhcvizow"

# ---- Edge function auth (verify_jwt) ----------------------------------------
# PUBLIC functions (verify_jwt = false): called from public forms / webhooks.
# They implement their own validation; intake fns are write-only via service role.
[functions.mca-intake]
verify_jwt = false

[functions.vcf-intake]
verify_jwt = false

[functions.contact-intake]
verify_jwt = false

[functions.partner-signup]
verify_jwt = false

[functions.ghl-webhook]
verify_jwt = false   # public inbound webhook — auth enforced in-code via fail-closed shared-secret gate (audit #3 hardened)

[functions.live-transfer-intake]
verify_jwt = false   # GHL live-transfer webhook / Zapier — auth enforced in-code via fail-closed shared-secret gate (?secret=)

[functions.process-document]
verify_jwt = false

[functions.process-document-upload]
verify_jwt = false

[functions.rag-chat]
verify_jwt = false

[functions.rag-chat-pgvector]
verify_jwt = false

[functions.gemini-chat]
verify_jwt = false

# PRIVILEGED functions (verify_jwt = true): require a signed-in user. The most
# sensitive (admin-users, submit-to-funders) ALSO enforce role checks in code.
[functions.admin-users]
verify_jwt = true

[functions.submit-to-funders]
verify_jwt = true

[functions.ghl-sync]
verify_jwt = true

[functions.ghl-comms]
verify_jwt = true

[functions.recommend-lenders]
verify_jwt = true

# Provider-key writes + connection test — enforces super_admin in code.
[functions.llm-admin]
verify_jwt = true

[functions.send-merchant-email]
verify_jwt = true

# Sends the EMAIL half of a Wave 4 merchant notification (portal message half is a
# DB trigger) + optional GHL tag — staff-only + closer-owns-deal enforced in code.
[functions.notify-merchant]
verify_jwt = true

# Read-only: fetches ONE email's full body from GHL for the Step 7 "view email"
# affordance — staff-only enforced in code.
[functions.get-funder-email]
verify_jwt = true

# Pushes the closer-filled MCA application into the merchant's GHL contact custom
# fields (document merge source) — staff-only + closer-owns-deal enforced in code.
[functions.push-application-to-ghl]
verify_jwt = true

# Syncs a lead's edited identity (name/email/phone) into the EXISTING GHL contact
# so delivery follows the fix — staff-only + closer-owns-deal enforced in code.
[functions.sync-lead-to-ghl]
verify_jwt = true

# Bulk CSV lead importer — ops-only. Runs service-role; JWT gate keeps it internal.
[functions.bulk-lead-import]
verify_jwt = true

[functions.poll-funder-replies]
verify_jwt = false

# Funder-reply reconciler — admin UI (user JWT) OR trusted cron (?secret=…).
# The cron sends the service-role key as Bearer to pass the gateway, then the
# shared-secret check inside grants the auto-apply path.
[functions.funder-reply-reconcile]
verify_jwt = true

# Synergy lead reconciliation sweep — proves every inbound vendor lead email became
# a deal, auto-recovers the ones that didn't, and digests what still needs a human.
# Two callers: staff (user JWT + role check in code) OR pg_cron (?secret=<GHL webhook
# secret> + anon-key Bearer for the gateway).
[functions.synergy-reconcile]
verify_jwt = true

# AI performance read on ONE lead-gen campaign (verdict + recommendations).
# Staff-only enforced in code (getUser + profiles.role check).
[functions.analyze-campaign]
verify_jwt = true

# AI sales recommendations for ONE customer/lead. Moves the old client-side Gemini
# call server-side (audit #4 — VITE_GEMINI_API_KEY was in the bundle). Staff-only
# enforced in code (getUser + profiles.role check). Key from vault via callLLM.
[functions.recommend-customer]
verify_jwt = true

# Drive paid Firecrawl agent jobs from the lender/vendor edit modals (audit #4:
# these were verify_jwt = false, letting ANONYMOUS callers burn Firecrawl credits).
# Staff-only ALSO enforced in code (getUser + profiles.role) — belt and braces.
[functions.scan-lender-website]
verify_jwt = true

[functions.scan-vendor-website]
verify_jwt = true

# Scrapes a lender website + AI-extracts structured funder data. Moves the old
# client-side Firecrawl+Gemini pipeline server-side (audit #4 — VITE_FIRECRAWL_API_KEY
# / VITE_GEMINI_API_KEY were in the bundle). Staff-only enforced in code; keys from
# the vault (Deno.env FIRECRAWL_API_KEY + callLLM provider key).
[functions.lender-extract]
verify_jwt = true

# Deal-desk AI chat scoped to ONE deal, mounted in the Revenue Playbook. Answers
# "the funder is asking for X" instantly from the deal's full context (merchant,
# financials, stage, doc checklist, every funder + what they said, underwriting,
# activity). Staff-only enforced in code; a CLOSER may only ask about a deal they
# own (closer_owns_deal RPC). Key from the vault via callLLM.
[functions.deal-assistant]
verify_jwt = true

# Sends a merchant a passwordless magic-link portal invite. Signed-in staff only
# (in-code role check); closers limited to their own customers.
[functions.merchant-invite]
verify_jwt = true

# Merchant self-serves a passwordless sign-in link (logged-out mechant on the
# sign-in / expired-link screens). Anon-callable — auth is impossible before a merchant is
# signed in — so it never enumerates accounts (always returns ok:true) and throttles
# to one send per customer per 2 minutes.
[functions.merchant-login-link]
verify_jwt = false

# Live "docs back from the merchant" status. Staff, OR the merchant asking about
# their OWN GHL contact (in-code ownership check).
[functions.ghl-docs-status]
verify_jwt = true

# Merchant-triggered "send me a fresh BLANK application" fallback. Merchant-gated
# (own contact resolved from auth.uid); rate-limited so it can't stack copies.
[functions.request-blank-application]
verify_jwt = true

# Side effects after a MERCHANT uploads a portal document (audit #24). Signed-in;
# caller must OWN the document's customer (or be ops staff) — in-code check.
# Writes activity_log + re-runs the AI underwriter on bank statements.
[functions.merchant-doc-uploaded]
verify_jwt = true

# Staff (or the owning closer) generate + freeze + send a merchant e-signable
# document from a template for a deal. Injects the state disclosure at merge time.
[functions.send-merchant-document]
verify_jwt = true

# A MERCHANT e-signs a sent document. Signed-in; caller must OWN the document's
# customer (in-code check). Appends the signature ledger row, writes the signed
# artifact to storage, and drops the customer_documents 'application' copy.
[functions.sign-merchant-document]
verify_jwt = true

# Email-deliverability watchdog — reads each merchant's last OUTBOUND GHL email
# record and stamps customers.email_status ('bounced' | 'ok'), so a dead vendor-supplied
# mailbox is visible on the deal within minutes of the lead landing instead of after a
# closer has filled out the whole application. Two callers: staff (user JWT + role check
# in code) OR pg_cron (?secret=<GHL webhook secret> + anon-key Bearer for the gateway).
[functions.check-email-bounces]
verify_jwt = true

# Lead scoring v1 — computes grade A–D + expected value per deal, writes the deals
# score columns + an append-only lead_score_events row. Three callers: staff (user
# JWT + role check in code), fn-to-fn fire-and-forget (service-role bearer), OR
# pg_cron nightly sweep (?secret=<GHL webhook secret> + anon-key Bearer for the gateway).
[functions.score-lead]
verify_jwt = true

# Email verification at intake — asks Instantly whether a merchant's mailbox actually
# exists and stamps customers.email_status ('verified' | 'invalid' | 'catch_all' | …).
# Fired by the customers_verify_email DB trigger on every new/changed merchant email,
# and by the "Re-verify" button on the deal. Two callers: staff (user JWT + role check
# in code) OR the trigger (?secret=<GHL webhook secret> + anon-key Bearer for the gateway).
[functions.verify-merchant-email]
verify_jwt = true

# Projects deals.callback_at onto the GHL "Callbacks — Internal" calendar
# (one-way DB→GHL upsert/cancel; sync state written back to the deal). Two
# callers: staff (user JWT + role check in code) OR pg_cron every 5 min
# (?secret=<GHL webhook secret> + anon-key Bearer for the gateway).
[functions.callback-calendar-sync]
verify_jwt = true

# One-button Firecrawl research on a lead's business (LOAD/CONFIRM per
# research/PLAN_business_enrichment.md). Staff-only enforced in code; a CLOSER may
# only research deals they own (closer_owns_deal RPC). FIRECRAWL_API_KEY from the
# secret store only. Cost-gated: business_key cache + daily cap (429 when hit).
[functions.enrich-business]
verify_jwt = true

# GHL → Supabase document bridge. Merchants upload their statements/ID through the
# GHL secure-upload link, so the files live on the GHL contact and never reached our
# storage — which is why the AI underwriter 422'd on every real deal. Pulls them into
# the private customer-documents bucket + customer_documents (idempotent on the GHL
# file id). Staff (user JWT + role check in code) or a service-role bearer.
[functions.ingest-ghl-documents]
verify_jwt = true
